name: release
on:
  push:
    tags: [ "v*.*.*" ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: go test -race -coverprofile=cover.out ./...
      - run: cd web && npm ci && npm run typecheck && npm run test
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/kubeshell-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/kubeshell-web:latest
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/kubeshell-web:${{
          github.ref_name }}
      - uses: azure/setup-helm@v4
      - run: helm package chart/latest
      - run: helm push kubeshell-web-*.tgz oci://ghcr.io/${{ github.repository_owner
          }}/charts
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
