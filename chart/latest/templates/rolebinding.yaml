apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeshell-web.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubeshell-web.serviceAccountName" . }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "kubeshell-web.fullname" . }}
