apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeshell-web.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: {{ include "kubeshell-web.fullname" . }} }
  template:
    metadata:
      labels: { app: {{ include "kubeshell-web.fullname" . }} }
    spec:
      serviceAccountName: {{ include "kubeshell-web.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: TARGET_KIND
              value: {{ .Values.target.kind | quote }}
            - name: TARGET_NAME
              value: {{ .Values.target.name | quote }}
            - name: TARGET_NAMESPACE
              value: {{ default .Release.Namespace .Values.target.namespace | quote }}
          ports:
            - name: http
              containerPort: 8080
          resources: {{- toYaml .Values.resources | nindent 12 }}
