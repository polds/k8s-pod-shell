image:
  repository: ghcr.io/polds/kubeshell-web
  tag: ""
  pullPolicy: IfNotPresent

target:
  kind: Deployment
  name: sample-workload
  namespace: ""

service:
  type: ClusterIP
  port: 80

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ "ALL" ]
  readOnlyRootFilesystem: true
  runAsNonRoot: true

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []
